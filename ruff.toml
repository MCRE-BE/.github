# Exclude a variety of commonly ignored directories.
exclude = [
".git",
"__pycache__",
"docs",
"old",
"_old",
"build",
"dist",
"config.py",
]
# Same as Black.
line-length = 120
indent-width = 4
extend-exclude = ["notebooks"]
target-version = "py310"

[format]
# WARNING: Preview formatting rules are unstable and may change between ruff versions.
# Consumer repos should pin the same ruff version to avoid cross-version format drift.
preview = true

[lint]
exclude = ["__init__.py"]
select = ["ALL"]
ignore = [
      #
      # FULL MODULES
      #
      "DTZ", # flake8-datetimez (DTZ) on pypi
      "ERA", # eradicate (ERA) on pypi
      "PTH", # flake8-use-pathlib (PTH) on pypi
      "G", # flake8-logging-format

      #
      # RULE BY RULE
      #
      "PLR0913", # Too many arguments in function definition
      "PLR0911", # Too many return statements
      "PLR0915", # Too many statements
      "PLR2004", # magic-value-comparison (PLR2004)

      "BLE001", # blind-except


      "E701", #  multiple statements on one line (colon)
      "EM101", #  empty except clause

      "D104", # Missing docstring in public package
      "D105", # undocumented-magic-method
      "D202", #  No blank lines allowed after function docstring
      "D211", #  No blank lines allowed before class docstring
      "D401", #  First line should be in imperative mood; try rephrasing

      "E402", #  module level import not at top of file

      "LOG015",  # Checks for usages of the following logging top-level functions: debug, info, warn, warning, error, critical, log, exception.

      "PLC0415", # Checks for import statements outside of a module's top-level scope

      "RET504", # unnecessary-assign
      "RUF022", # unsorted-dunder-all

      "SLF001", # private-member-access

      "TRY002", # raise-vanilla-class
      "TRY003", # unnecessary-except-type
      "TC004",  # runtime-import-in-type-checking-block (renamed from TCH004 in ruff 0.5+)
]

[lint.pydocstyle]
convention = "numpy"

[lint.pycodestyle]
max-line-length = 120

[lint.mccabe]
# Flag errors (`C901`) whenever the complexity level exceeds 12 (increase/decrease if needed).
max-complexity = 12

[lint.flake8-unused-arguments]
# allow unused variadic arguments, like *args and **kwargs
ignore-variadic-names = true

[lint.extend-per-file-ignores]
"**/tests/*" = [
    "D100",
    "D103",
    "D104",
    "ANN401",
    "ANN002",
    "ANN003",
    "FBT001",
    "FBT002",
    "ARG001",
    "D101",
    "D102",
    "D105",
    "S101",
    "ANN001",
    "ANN201",
    "ANN202",
    "ANN204",
    "ANN205",
    "SLF001",
    "PLR2004",
    "PLR6301",
    "PLW0108",
    "FBT003",
    "INP001",
]
